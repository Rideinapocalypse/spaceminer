<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Colony — Idle Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:  #07071a;
      --bg2: #0e0e2a;
      --bg3: #14143a;
      --cyan:   #0ff;
      --yellow: #ff0;
      --green:  #0f0;
      --orange: #fa0;
      --purple: #c8f;
      --red:    #f55;
      --pink:   #f8a;
      --border: #1e1e4a;
      --dim:    #446;
      --text:   #bbd;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      line-height: 1.6;
    }

    #wrap {
      display: grid;
      grid-template-columns: 1fr 200px;
      grid-template-rows: auto 1fr auto;
      gap: 6px;
      padding: 6px;
      min-height: 100vh;
    }

    /* ── Header ── */
    #hdr {
      grid-column: 1 / -1;
      background: var(--bg2);
      border: 2px solid var(--border);
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    #hdr h1 { font-size: 9px; color: var(--cyan); letter-spacing: 1px; }
    .res-bar { display: flex; gap: 14px; margin-left: auto; flex-wrap: wrap; }
    .res { display: flex; gap: 5px; align-items: center; font-size: 6px; }
    .rv { color: var(--yellow); min-width: 52px; }

    /* ── Main ── */
    #main {
      background: var(--bg2);
      border: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 6px;
      overflow: hidden;
    }

    #scene-wrap {
      position: relative;
      background: #050510;
      border: 1px solid var(--border);
      height: 230px;
      overflow: hidden;
      cursor: pointer;
    }
    #scene-wrap:active { filter: brightness(1.3); }
    canvas { display: block; width: 100%; height: 100%; }
    #hint {
      position: absolute;
      bottom: 5px; right: 7px;
      font-size: 5px;
      color: var(--dim);
      pointer-events: none;
    }

    #btitle {
      font-size: 7px;
      color: var(--green);
      border-bottom: 1px solid var(--border);
      padding-bottom: 3px;
    }
    #blist {
      display: flex;
      flex-direction: column;
      gap: 5px;
      overflow-y: auto;
      flex: 1;
    }

    .bb {
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 6px;
      cursor: pointer;
      font-family: 'Press Start 2P', monospace;
      font-size: 5px;
      color: var(--text);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 3px;
      align-items: center;
      text-align: left;
      transition: border-color .1s;
    }
    .bb:hover:not(:disabled) { border-color: var(--yellow); background: #12122e; }
    .bb:disabled { opacity: .35; cursor: not-allowed; }
    .bn { color: var(--cyan); font-size: 6px; margin-bottom: 2px; }
    .bd { color: var(--dim); font-size: 4px; line-height: 1.6; }
    .bc { color: var(--yellow); font-size: 6px; white-space: nowrap; }
    .bk {
      background: var(--purple);
      color: #000;
      font-size: 5px;
      padding: 1px 4px;
      border-radius: 2px;
      min-width: 18px;
      text-align: center;
    }

    /* ── Sidebar ── */
    #side { display: flex; flex-direction: column; gap: 6px; }

    #sp {
      background: var(--bg2);
      border: 2px solid var(--border);
      padding: 7px;
    }
    #st {
      font-size: 7px;
      color: var(--orange);
      border-bottom: 1px solid var(--border);
      padding-bottom: 3px;
      margin-bottom: 6px;
    }
    .sr { display: flex; justify-content: space-between; font-size: 5px; margin-bottom: 5px; gap: 6px; }
    .sl { color: var(--dim); }
    .sv { color: var(--green); }

    #lp {
      background: var(--bg2);
      border: 2px solid var(--border);
      padding: 7px;
      flex: 1;
    }
    #lt {
      font-size: 7px;
      color: #88f;
      border-bottom: 1px solid var(--border);
      padding-bottom: 3px;
      margin-bottom: 5px;
    }
    #log {
      font-family: 'VT323', monospace;
      font-size: 13px;
      line-height: 1.4;
      max-height: 160px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .ll { border-left: 2px solid var(--border); padding-left: 3px; }
    .ll.g { border-color: var(--green); color: #9fb; }
    .ll.i { border-color: #88f; color: #aaf; }

    /* ── Footer ── */
    #ftr {
      grid-column: 1 / -1;
      background: var(--bg2);
      border: 2px solid var(--border);
      padding: 5px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    #ftr span { font-size: 5px; color: var(--dim); }

    #pbtn {
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      font-family: 'Press Start 2P', monospace;
      font-size: 5px;
      padding: 3px 7px;
      cursor: pointer;
      opacity: .4;
      transition: opacity .2s;
    }
    #pbtn.rdy {
      opacity: 1;
      animation: glow 1s infinite alternate;
    }

    /* ── Floaters ── */
    .flt {
      position: absolute;
      pointer-events: none;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--yellow);
      animation: fup 1s ease-out forwards;
    }

    /* ── Animations ── */
    @keyframes glow {
      from { box-shadow: none; }
      to   { box-shadow: 0 0 6px var(--red); }
    }
    @keyframes fup {
      0%   { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-35px); }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Responsive ── */
    @media (max-width: 580px) {
      #wrap { grid-template-columns: 1fr; }
      #side { grid-row: 3; }
      #scene-wrap { height: 180px; }
      #log { max-height: 80px; }
    }
  </style>
</head>
<body>

<div id="wrap">

  <!-- Header -->
  <div id="hdr">
    <h1>&#11088; SPACE COLONY</h1>
    <div class="res-bar">
      <div class="res"><span>&#128301;</span><span>Credits</span><span class="rv" id="rc">0</span></div>
      <div class="res"><span>&#9889;</span><span>CPS</span><span class="rv" id="re">0</span></div>
      <div class="res"><span>&#128081;</span><span>Pop</span><span class="rv" id="rp">0</span></div>
    </div>
  </div>

  <!-- Main panel -->
  <div id="main">
    <div id="scene-wrap" onclick="doClick(event)">
      <canvas id="c"></canvas>
      <div id="hint">CLICK TO MINE</div>
    </div>
    <div id="btitle">&#128736; BUILDINGS</div>
    <div id="blist"></div>
  </div>

  <!-- Sidebar -->
  <div id="side">
    <div id="sp">
      <div id="st">&#128202; STATS</div>
      <div class="sr"><span class="sl">Total earned</span><span class="sv" id="s0">0</span></div>
      <div class="sr"><span class="sl">Credits/sec</span><span class="sv" id="s1">0.00</span></div>
      <div class="sr"><span class="sl">Hand mined</span><span class="sv" id="s2">0</span></div>
      <div class="sr"><span class="sl">Run time</span><span class="sv" id="s3">0s</span></div>
      <div class="sr"><span class="sl">Milestones</span><span class="sv" id="s4">0</span></div>
      <div class="sr"><span class="sl">Prestige</span><span class="sv" id="s5">0</span></div>
    </div>
    <div id="lp">
      <div id="lt">&#128225; COMMS LOG</div>
      <div id="log"></div>
    </div>
  </div>

  <!-- Footer -->
  <div id="ftr">
    <span id="ftxt">Mine credits to expand your colony!</span>
    <button id="pbtn" onclick="prestige()">&#9889; PRESTIGE</button>
  </div>

</div>

<script>
  // ─────────────────────────────────────────────
  //  GAME STATE
  // ─────────────────────────────────────────────
  const G = {
    credits: 0, total: 0, clicks: 0, cps: 0, cp: 1,
    start: Date.now(), miles: 0, nextM: 0, prestigeCount: 0,

    buildings: [
      { id:'drill',   name:'Ore Drill',    desc:'+0.1/s each',  base:10,     cps:0.1,  count:0, mult:1.15 },
      { id:'solar',   name:'Solar Array',  desc:'+0.5/s each',  base:60,     cps:0.5,  count:0, mult:1.15 },
      { id:'rover',   name:'Mining Rover', desc:'+2/s each',    base:300,    cps:2,    count:0, mult:1.15 },
      { id:'bot',     name:'Astro Bot',    desc:'+5/s each',    base:1200,   cps:5,    count:0, mult:1.15 },
      { id:'reactor', name:'Fusion Core',  desc:'+15/s each',   base:5000,   cps:15,   count:0, mult:1.15 },
      { id:'cannon',  name:'Mass Driver',  desc:'+40/s each',   base:20000,  cps:40,   count:0, mult:1.15 },
      { id:'warp',    name:'Warp Gate',    desc:'+120/s each',  base:80000,  cps:120,  count:0, mult:1.15 },
      { id:'dyson',   name:'Dyson Sphere', desc:'+500/s each',  base:500000, cps:500,  count:0, mult:1.15 },
    ],

    mlist: [
      { at:10,    msg:'First ore collected!',   t:'i' },
      { at:100,   msg:'Colony established!',    t:'g' },
      { at:1000,  msg:'Mining boom underway!',  t:'g' },
      { at:10000, msg:'Asteroid belt cleared!', t:'g' },
      { at:1e5,   msg:'Interstellar wealth!',   t:'g' },
      { at:1e6,   msg:'Galactic empire!',       t:'g' },
      { at:1e7,   msg:'Dyson Sphere online!',   t:'g' },
    ],
  };

  // ─────────────────────────────────────────────
  //  HELPERS
  // ─────────────────────────────────────────────
  function bcost(b) { return Math.floor(b.base * Math.pow(b.mult, b.count)); }

  function fmt(n) {
    if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return Math.floor(n) + '';
  }

  function recalc() {
    G.cps = G.buildings.reduce((s, b) => s + b.cps * b.count, 0);
    G.cp  = Math.max(1, Math.floor(G.cps * 0.01 + 1));
  }

  // ─────────────────────────────────────────────
  //  UI
  // ─────────────────────────────────────────────
  function ui() {
    document.getElementById('rc').textContent = fmt(G.credits);
    document.getElementById('re').textContent = G.cps.toFixed(1);
    document.getElementById('rp').textContent = G.buildings.reduce((s, b) => s + b.count, 0);
    document.getElementById('s0').textContent = fmt(G.total);
    document.getElementById('s1').textContent = G.cps.toFixed(2);
    document.getElementById('s2').textContent = fmt(G.clicks);
    document.getElementById('s5').textContent = G.prestigeCount;

    const sec = Math.floor((Date.now() - G.start) / 1000);
    const h = Math.floor(sec / 3600), m = Math.floor(sec % 3600 / 60), s = sec % 60;
    document.getElementById('s3').textContent = h ? `${h}h ${m}m` : m ? `${m}m ${s}s` : `${s}s`;
    document.getElementById('s4').textContent = G.miles;

    G.buildings.forEach(b => {
      const btn = document.getElementById('b_' + b.id);
      if (!btn) return;
      btn.disabled = G.credits < bcost(b);
      btn.querySelector('.bc').textContent = fmt(bcost(b));
      btn.querySelector('.bk').textContent = b.count;
    });

    document.getElementById('pbtn').classList.toggle('rdy', G.total >= 1e6);
    checkM();
  }

  function checkM() {
    const m = G.mlist[G.nextM];
    if (m && G.total >= m.at) {
      addLog(m.msg, m.t);
      G.miles++; G.nextM++;
      document.getElementById('ftxt').textContent = m.msg;
    }
  }

  function addLog(msg, t) {
    const d   = document.getElementById('log');
    const el  = document.createElement('div');
    el.className = 'll ' + (t || 'i');
    el.textContent = '> ' + msg;
    d.prepend(el);
    while (d.children.length > 30) d.removeChild(d.lastChild);
  }

  // ─────────────────────────────────────────────
  //  BUILDINGS LIST
  // ─────────────────────────────────────────────
  function buildList() {
    const cont = document.getElementById('blist');
    cont.innerHTML = '';
    G.buildings.forEach(b => {
      const btn = document.createElement('button');
      btn.className = 'bb';
      btn.id = 'b_' + b.id;
      btn.innerHTML = `
        <div>
          <div class="bn">${b.name}</div>
          <div class="bd">${b.desc}</div>
        </div>
        <div style="text-align:right">
          <div class="bc">${fmt(bcost(b))}</div>
          <div class="bk">${b.count}</div>
        </div>`;
      btn.addEventListener('click', () => {
        const c = bcost(b);
        if (G.credits < c) return;
        G.credits -= c;
        b.count++;
        recalc();
        addLog('Built ' + b.name + ' #' + b.count, 'g');
        ui();
      });
      cont.appendChild(btn);
    });
  }

  // ─────────────────────────────────────────────
  //  CLICK HANDLER
  // ─────────────────────────────────────────────
  function doClick(e) {
    G.credits += G.cp;
    G.total   += G.cp;
    G.clicks++;

    const r  = e.currentTarget.getBoundingClientRect();
    const el = document.createElement('div');
    el.className   = 'flt';
    el.textContent = '+' + G.cp;
    el.style.cssText = `left:${e.clientX - r.left}px; top:${e.clientY - r.top - 10}px`;
    e.currentTarget.appendChild(el);
    setTimeout(() => el.remove(), 1000);
    ui();
  }

  // ─────────────────────────────────────────────
  //  PRESTIGE
  // ─────────────────────────────────────────────
  function prestige() {
    if (G.total < 1e6) return;
    if (!confirm('PRESTIGE? All progress resets, but your click power is boosted!')) return;
    G.prestigeCount++;
    G.credits = 0; G.total = 0; G.clicks = 0; G.cps = 0;
    G.nextM = 0; G.miles = 0; G.start = Date.now();
    G.buildings.forEach(b => b.count = 0);
    recalc();
    addLog('Prestige #' + G.prestigeCount + '! Colony reborn!', 'g');
    document.getElementById('ftxt').textContent = 'Prestige #' + G.prestigeCount + ' — start again!';
    ui();
  }

  // ─────────────────────────────────────────────
  //  CANVAS / ANIMATED SCENE
  // ─────────────────────────────────────────────
  const cv  = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W, H, stars = [], frame = 0;

  // Rover
  const rover = { x: 0, dir: 1, speed: 0.7, mining: false, mineTimer: 0 };

  // Colonists
  const colonists = [
    { x: 0, dir:  1, speed: 0.35, color: '#f88', legPhase: 0   },
    { x: 0, dir: -1, speed: 0.28, color: '#88f', legPhase: 1.5 },
    { x: 0, dir:  1, speed: 0.22, color: '#8f8', legPhase: 3.0 },
  ];

  // Ore particles
  const oreParts = [];

  function initScene() {
    cv.width  = cv.offsetWidth;
    cv.height = cv.offsetHeight;
    W = cv.width; H = cv.height;

    stars = Array.from({ length: 60 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H * 0.65,
      r: Math.random() < 0.25 ? 2 : 1,
      t: Math.random() * Math.PI * 2,
    }));

    rover.x = W * 0.1;
    colonists[0].x = W * 0.55;
    colonists[1].x = W * 0.65;
    colonists[2].x = W * 0.73;
  }

  function gnd() { return Math.floor(H * 0.67); }

  function blk(x, y, w, h, col) {
    ctx.fillStyle = col;
    ctx.fillRect(Math.round(x), Math.round(y), w, h);
  }

  // ── Draw rover ──
  function drawRover(x, t) {
    const g = gnd();
    ctx.save();
    if (rover.dir < 0) { ctx.translate(x + 28, g - 2); ctx.scale(-1, 1); ctx.translate(-14, 0); }
    else { ctx.translate(x, g - 2); }
    // Wheels
    blk(0, -10, 8, 10, '#444'); blk(20, -10, 8, 10, '#444');
    blk(1, -11, 6, 2, '#777'); blk(21, -11, 6, 2, '#777');
    // Body
    blk(2, -22, 24, 14, '#3a8848');
    blk(4, -24, 20,  4, '#4a9958');
    // Cabin
    blk(6, -32, 16, 12, '#2a6636');
    blk(8, -30,  4,  8, '#7de8ff');
    blk(14,-30,  4,  8, '#7de8ff');
    // Mining arm
    const armA = rover.mining ? Math.sin(t * 6) * 0.45 : -0.1;
    ctx.save(); ctx.translate(24, -18); ctx.rotate(armA);
    blk(0, -14, 3, 14, '#777');
    blk(-2, -16, 7,  4, '#ffaa00');
    ctx.restore();
    // Antenna
    blk(12, -38, 2, 8, '#999');
    blk(10, -40, 6, 2, '#f00');
    ctx.restore();
  }

  // ── Draw colonist ──
  function drawColonist(col, t) {
    const g  = gnd();
    const lp = Math.sin(t * 4 + col.legPhase);
    ctx.save();
    if (col.dir < 0) { ctx.translate(col.x + 10, g); ctx.scale(-1, 1); ctx.translate(-5, 0); }
    else ctx.translate(col.x, g);
    // Legs
    blk(1 + lp * 2, -12, 3, 12, col.color + '88');
    blk(6 - lp * 2, -12, 3, 12, col.color + '88');
    // Body
    blk(0, -28, 12, 16, col.color);
    // Helmet
    blk(1, -38, 10, 12, '#223344');
    blk(3, -36,  6,  8, '#7de8ff');
    // Arms
    blk(-3, -26 + lp * 2, 3, 8, col.color);
    blk(12,  -26 - lp * 2, 3, 8, col.color);
    // Visor tint
    blk(3, -35, 6, 6, 'rgba(100,200,255,0.3)');
    ctx.restore();
  }

  // ── Draw rock ──
  function drawRock(x, g, size, col) {
    blk(x,      g - size,     size * 2,     size,     col);
    blk(x - 2,  g - size + 2, size * 2 + 4, size - 2, col);
    blk(x + 2,  g - size - 2, size * 2 - 4, 4,        col);
  }

  // ── Main draw function ──
  function drawScene() {
    if (!W) return;
    const t = Date.now() / 1000;
    const g = gnd();

    ctx.clearRect(0, 0, W, H);

    // Sky
    ctx.fillStyle = '#03030f'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#060618'; ctx.fillRect(0, H * 0.3, W, H * 0.4);

    // Nebula
    ctx.fillStyle = 'rgba(80,0,120,0.05)';  ctx.fillRect(W * 0.1, H * 0.05, W * 0.3, H * 0.3);
    ctx.fillStyle = 'rgba(0,60,120,0.05)';  ctx.fillRect(W * 0.5, H * 0.1,  W * 0.4, H * 0.25);

    // Stars
    stars.forEach(s => {
      const a = 0.3 + 0.6 * Math.sin(s.t + t * 0.5);
      ctx.fillStyle = `rgba(200,220,255,${a})`;
      ctx.fillRect(Math.round(s.x), Math.round(s.y), s.r, s.r);
    });

    // Moons
    ctx.fillStyle = '#2a1e4a';
    ctx.beginPath(); ctx.arc(W * 0.14, H * 0.15, 18, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1a1230';
    ctx.beginPath(); ctx.arc(W * 0.14 + 6, H * 0.15 - 4, 7, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#3a2e5a';
    ctx.beginPath(); ctx.arc(W * 0.83, H * 0.1, 11, 0, Math.PI * 2); ctx.fill();

    // Dyson Sphere glow
    if (G.buildings[7].count > 0) {
      ctx.fillStyle = 'rgba(255,190,0,0.08)'; ctx.fillRect(0, 0, W, H * 0.6);
      ctx.fillStyle = 'rgba(255,190,0,0.12)'; ctx.fillRect(W * 0.3, 0, W * 0.4, H * 0.4);
    }

    // Warp Gate
    if (G.buildings[6].count > 0) {
      const wx = W * 0.88, wy = g - 46, pa = t * 1.2;
      ctx.strokeStyle = '#a04fff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.ellipse(wx, wy, 10, 28, pa, 0, Math.PI * 2); ctx.stroke();
      ctx.strokeStyle = 'rgba(160,80,255,0.35)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.ellipse(wx, wy, 16, 34, pa + 0.6, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = 'rgba(160,80,255,0.55)';
      ctx.beginPath(); ctx.arc(wx, wy, 8, 0, Math.PI * 2); ctx.fill();
    }

    // Mass Driver cannon
    if (G.buildings[5].count > 0) {
      const rl = Math.sin(t * 2) * 2;
      blk(W * 0.06,      g - 50, 14, 50, '#334433');
      blk(W * 0.06 - 4,  g - 55, 22, 10, '#445544');
      blk(W * 0.06 + 5,  g - 70 + rl, 4, 20, '#556655');
      blk(W * 0.06 + 2,  g - 80, 10, 15, '#334433');
    }

    // Ground
    blk(0, g, W, H - g, '#120d08');
    blk(0, g, W, 4, '#2a1808');

    // Rocks
    const rocks = [
      { x: W*0.04, s: 6, c: '#1a1108' }, { x: W*0.19, s: 4, c: '#1e1408' },
      { x: W*0.43, s: 8, c: '#161008' }, { x: W*0.62, s: 5, c: '#1a1108' },
      { x: W*0.77, s: 7, c: '#180e06' }, { x: W*0.92, s: 4, c: '#1a1208' },
    ];
    rocks.forEach(r => drawRock(r.x, g, r.s, r.c));

    // Craters
    [
      [W * 0.22, g + 12, 16, 8],
      [W * 0.50, g + 20, 22, 10],
      [W * 0.78, g + 10, 12,  6],
    ].forEach(([cx2, cy, rw, rh]) => {
      ctx.fillStyle = '#0d0806';
      ctx.beginPath(); ctx.ellipse(cx2, cy, rw, rh, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#200f06'; ctx.lineWidth = 1; ctx.stroke();
    });

    // Ore deposits (glow on surface)
    const oreCount = Math.min(3 + G.buildings[0].count, 7);
    for (let i = 0; i < oreCount; i++) {
      const ox    = W * (0.08 + i * 0.13);
      const pulse = 0.5 + 0.4 * Math.sin(t * 2 + i);
      ctx.fillStyle = `rgba(255,160,0,${pulse * 0.6})`;
      ctx.fillRect(Math.round(ox) - 3, g - 5, 6, 5);
      ctx.fillStyle = 'rgba(255,200,50,0.85)';
      ctx.fillRect(Math.round(ox) - 1, g - 4, 2, 3);
    }

    // Base dome
    ctx.fillStyle = '#1a2d4a';
    ctx.beginPath(); ctx.ellipse(W * 0.5, g, 38, 42, 0, -Math.PI, 0); ctx.fill();
    ctx.strokeStyle = '#3a6daa'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = 'rgba(100,200,255,0.18)';
    ctx.beginPath(); ctx.ellipse(W * 0.5, g - 16, 16, 18, 0, -Math.PI, 0); ctx.fill();
    blk(W * 0.5 - 4, g - 12, 8, 12, '#0d1a33');

    // Ore drill
    if (G.buildings[0].count > 0) {
      const dx = W * 0.31;
      blk(dx - 2, g - 30, 4, 30, '#6a4010');
      blk(dx - 7, g - 8,  14, 5, '#444');
      ctx.save(); ctx.translate(dx, g - 30); ctx.rotate(t * 3);
      blk(-4, -4, 8, 8, '#cc6600'); ctx.restore();
      blk(dx - 1, g - 38, 2, 10, '#aa7730');
    }

    // Solar panels
    if (G.buildings[1].count > 0) {
      const sx = W * 0.69;
      blk(sx - 1, g - 32, 2, 32, '#333');
      [sx - 24, sx + 4].forEach(px => {
        blk(px, g - 32, 20, 13, '#0d3daa');
        for (let i = 0; i < 3; i++) blk(px + 1 + i * 7, g - 31, 5, 11, '#1555cc');
      });
    }

    // Fusion core
    if (G.buildings[4].count > 0) {
      const rx = W * 0.14;
      blk(rx - 9,  g - 40, 18, 40, '#223318');
      blk(rx - 11, g - 44, 22,  8, '#334422');
      blk(rx - 6,  g - 55, 12, 14, '#445530');
      const gv = 0.3 + 0.25 * Math.sin(t * 3);
      ctx.fillStyle = `rgba(0,255,80,${gv})`;
      ctx.beginPath(); ctx.arc(rx, g - 48, 7,  0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(0,255,80,0.12)';
      ctx.beginPath(); ctx.arc(rx, g - 48, 18, 0, Math.PI * 2); ctx.fill();
    }

    // Walking colonists
    const crewCount = Math.min(G.buildings[2].count + G.buildings[3].count, 3);
    for (let i = 0; i < crewCount; i++) {
      const col = colonists[i];
      col.x += col.speed * col.dir;
      if (col.x > W * 0.9 || col.x < W * 0.04) col.dir *= -1;
      drawColonist(col, t);
    }

    // Astro bots
    if (G.buildings[3].count > 0) {
      [W * 0.38, W * 0.58].forEach((bx, bi) => {
        const bob = Math.sin(t * 3 + bi) * 2;
        const by  = g - 20 + bob;
        blk(bx - 5, by,       10, 14, '#445566');
        blk(bx - 3, by - 6,    7,  6, '#334455');
        blk(bx - 1, by - 5,    3,  3, '#ff3300');
        blk(bx - 7, by + 2,    2,  7, '#334455');
        blk(bx + 5, by + 2,    2,  7, '#334455');
        blk(bx - 3, by + 14,   2,  7, '#223344');
        blk(bx + 1, by + 14,   2,  7, '#223344');
      });
    }

    // Moving rover
    if (G.buildings[2].count > 0) {
      rover.x += rover.speed * rover.dir;
      const oc = Math.min(3 + G.buildings[0].count, 7);
      let nearOre = false;
      for (let i = 0; i < oc; i++) {
        if (Math.abs(rover.x + 14 - W * (0.08 + i * 0.13)) < 22) { nearOre = true; break; }
      }
      rover.mining = nearOre;
      if (nearOre) {
        rover.mineTimer++;
        if (rover.mineTimer % 28 === 0) {
          oreParts.push({
            x: rover.x + 24, y: g - 15,
            vy: -1.5, vx: (Math.random() - 0.5) * 2,
            life: 60,
          });
        }
      } else rover.mineTimer = 0;
      if (rover.x > W * 0.95) rover.dir = -1;
      if (rover.x < W * 0.02) rover.dir =  1;
      drawRover(rover.x, t);
    }

    // Ore particles
    for (let i = oreParts.length - 1; i >= 0; i--) {
      const p = oreParts[i];
      p.x += p.vx; p.y += p.vy; p.life--;
      ctx.globalAlpha = p.life / 60;
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(Math.round(p.x), Math.round(p.y), 3, 3);
      ctx.globalAlpha = 1;
      if (p.life <= 0) oreParts.splice(i, 1);
    }

    // HUD overlay
    ctx.fillStyle = 'rgba(0,255,255,0.4)';
    ctx.font = '6px "Press Start 2P"';
    ctx.textAlign = 'left';
    ctx.fillText('BLDGS: ' + G.buildings.reduce((s, b) => s + b.count, 0), 5, 13);
    ctx.fillText('CPS: '   + G.cps.toFixed(1), 5, 23);
    if (rover.mining) {
      ctx.fillStyle = 'rgba(255,160,0,0.85)';
      ctx.fillText('MINING...', 5, 33);
    }
  }

  // ─────────────────────────────────────────────
  //  GAME LOOP
  // ─────────────────────────────────────────────
  window.addEventListener('resize', initScene);
  initScene();
  buildList();
  addLog('Colony systems online.', 'i');
  addLog('Click the surface to mine ore.', 'i');
  ui();

  setInterval(() => {
    const dt = 0.1;
    G.credits += G.cps * dt;
    G.total   += G.cps * dt;
    frame++;
    if (frame % 3 === 0) ui();
    drawScene();
  }, 100);
</script>
</body>
</html>

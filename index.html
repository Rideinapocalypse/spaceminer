<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Colony — Idle Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#07071a; --bg2:#0e0e2a; --bg3:#14143a;
      --cyan:#0ff; --yellow:#ff0; --green:#0f0; --orange:#fa0;
      --purple:#c8f; --red:#f55; --border:#1e1e4a; --dim:#446; --text:#bbd;
    }
    html,body { min-height:100vh; background:var(--bg); color:var(--text); font-family:'Press Start 2P',monospace; font-size:7px; line-height:1.6; }

    #wrap { display:grid; grid-template-columns:1fr 200px; grid-template-rows:auto 1fr auto; gap:6px; padding:6px; min-height:100vh; }

    #hdr { grid-column:1/-1; background:var(--bg2); border:2px solid var(--border); padding:6px 10px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    #hdr h1 { font-size:9px; color:var(--cyan); }
    .rb { display:flex; gap:14px; margin-left:auto; flex-wrap:wrap; }
    .r  { display:flex; gap:5px; align-items:center; font-size:6px; }
    .rv { color:var(--yellow); min-width:52px; }

    #main { background:var(--bg2); border:2px solid var(--border); display:flex; flex-direction:column; gap:6px; padding:6px; }

    #sw { position:relative; border:1px solid var(--border); height:240px; overflow:hidden; cursor:pointer; background:#03030f; }
    #sw:active { filter:brightness(1.4); }
    #gc { position:absolute; top:0; left:0; width:100%; height:100%; }
    #hint { position:absolute; bottom:5px; right:7px; font-size:5px; color:var(--dim); pointer-events:none; }

    #bt { font-size:7px; color:var(--green); border-bottom:1px solid var(--border); padding-bottom:3px; }
    #bl { display:flex; flex-direction:column; gap:5px; overflow-y:auto; flex:1; max-height:200px; }

    .bb { background:var(--bg3); border:1px solid var(--border); padding:6px; cursor:pointer; font-family:'Press Start 2P',monospace; font-size:5px; color:var(--text); display:grid; grid-template-columns:1fr auto; gap:3px; align-items:center; text-align:left; transition:border-color .1s; }
    .bb:hover:not(:disabled) { border-color:var(--yellow); background:#12122e; }
    .bb:disabled { opacity:.35; cursor:not-allowed; }
    .bn { color:var(--cyan); font-size:6px; margin-bottom:2px; }
    .bd { color:var(--dim); font-size:4px; line-height:1.6; }
    .bc { color:var(--yellow); font-size:6px; white-space:nowrap; }
    .bk { background:var(--purple); color:#000; font-size:5px; padding:1px 4px; border-radius:2px; min-width:18px; text-align:center; }

    #side { display:flex; flex-direction:column; gap:6px; }
    #sp { background:var(--bg2); border:2px solid var(--border); padding:7px; }
    #st { font-size:7px; color:var(--orange); border-bottom:1px solid var(--border); padding-bottom:3px; margin-bottom:6px; }
    .sr { display:flex; justify-content:space-between; font-size:5px; margin-bottom:5px; gap:6px; }
    .sl { color:var(--dim); } .sv { color:var(--green); }

    #lp { background:var(--bg2); border:2px solid var(--border); padding:7px; flex:1; }
    #lt { font-size:7px; color:#88f; border-bottom:1px solid var(--border); padding-bottom:3px; margin-bottom:5px; }
    #log { font-family:'VT323',monospace; font-size:13px; line-height:1.4; max-height:160px; overflow-y:auto; display:flex; flex-direction:column; gap:1px; }
    .ll { border-left:2px solid var(--border); padding-left:3px; }
    .ll.g { border-color:var(--green); color:#9fb; }
    .ll.i { border-color:#88f; color:#aaf; }

    #ftr { grid-column:1/-1; background:var(--bg2); border:2px solid var(--border); padding:5px 10px; display:flex; justify-content:space-between; align-items:center; gap:6px; flex-wrap:wrap; }
    #ftr span { font-size:5px; color:var(--dim); }
    #pb { background:transparent; border:1px solid var(--red); color:var(--red); font-family:'Press Start 2P',monospace; font-size:5px; padding:3px 7px; cursor:pointer; opacity:.4; transition:opacity .2s; }
    #pb.rdy { opacity:1; animation:gl 1s infinite alternate; }

    .flt { position:absolute; pointer-events:none; font-family:'Press Start 2P',monospace; font-size:8px; color:var(--yellow); animation:fu 1s ease-out forwards; }

    @keyframes gl { from{box-shadow:none} to{box-shadow:0 0 6px var(--red)} }
    @keyframes fu { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-36px)} }

    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    @media (max-width:580px) {
      #wrap { grid-template-columns:1fr; }
      #side { grid-row:3; }
      #sw   { height:180px; }
      #log  { max-height:80px; }
    }
  </style>
</head>
<body>
<div id="wrap">

  <div id="hdr">
    <h1>&#11088; SPACE COLONY</h1>
    <div class="rb">
      <div class="r"><span>&#128301;</span><span>Credits</span><span class="rv" id="rc">0</span></div>
      <div class="r"><span>&#9889;</span><span>CPS</span><span class="rv" id="re">0</span></div>
      <div class="r"><span>&#128081;</span><span>Pop</span><span class="rv" id="rp">0</span></div>
    </div>
  </div>

  <div id="main">
    <div id="sw" onclick="doClick(event)">
      <canvas id="gc"></canvas>
      <div id="hint">CLICK TO MINE</div>
    </div>
    <div id="bt">&#128736; BUILDINGS</div>
    <div id="bl"></div>
  </div>

  <div id="side">
    <div id="sp">
      <div id="st">&#128202; STATS</div>
      <div class="sr"><span class="sl">Total earned</span><span class="sv" id="s0">0</span></div>
      <div class="sr"><span class="sl">Credits/sec</span><span class="sv" id="s1">0.00</span></div>
      <div class="sr"><span class="sl">Hand mined</span><span class="sv" id="s2">0</span></div>
      <div class="sr"><span class="sl">Run time</span><span class="sv" id="s3">0s</span></div>
      <div class="sr"><span class="sl">Milestones</span><span class="sv" id="s4">0</span></div>
      <div class="sr"><span class="sl">Prestige</span><span class="sv" id="s5">0</span></div>
    </div>
    <div id="lp">
      <div id="lt">&#128225; COMMS LOG</div>
      <div id="log"></div>
    </div>
  </div>

  <div id="ftr">
    <span id="ftxt">Click the surface to mine credits!</span>
    <button id="pb" onclick="prestige()">&#9889; PRESTIGE</button>
  </div>

</div>
<script>
  const G = {
    credits:0, total:0, clicks:0, cps:0, cp:1,
    start:Date.now(), miles:0, nextM:0, pc:0,
    B:[
      {id:'drill',  name:'Ore Drill',    desc:'+0.1/s each', base:10,    cps:.1,  count:0, mult:1.15},
      {id:'solar',  name:'Solar Array',  desc:'+0.5/s each', base:60,    cps:.5,  count:0, mult:1.15},
      {id:'rover',  name:'Mining Rover', desc:'+2/s each',   base:300,   cps:2,   count:0, mult:1.15},
      {id:'bot',    name:'Astro Bot',    desc:'+5/s each',   base:1200,  cps:5,   count:0, mult:1.15},
      {id:'reactor',name:'Fusion Core',  desc:'+15/s each',  base:5000,  cps:15,  count:0, mult:1.15},
      {id:'cannon', name:'Mass Driver',  desc:'+40/s each',  base:20000, cps:40,  count:0, mult:1.15},
      {id:'warp',   name:'Warp Gate',    desc:'+120/s each', base:80000, cps:120, count:0, mult:1.15},
      {id:'dyson',  name:'Dyson Sphere', desc:'+500/s each', base:5e5,   cps:500, count:0, mult:1.15},
    ],
    ML:[
      {at:10,  msg:'First ore collected!', t:'i'},
      {at:100, msg:'Colony established!',  t:'g'},
      {at:1e3, msg:'Mining boom!',         t:'g'},
      {at:1e4, msg:'Belt cleared!',        t:'g'},
      {at:1e5, msg:'Interstellar wealth!', t:'g'},
      {at:1e6, msg:'Galactic empire!',     t:'g'},
    ]
  };

  function bc(b) { return Math.floor(b.base * Math.pow(b.mult, b.count)); }
  function fmt(n) {
    if (n>=1e9) return (n/1e9).toFixed(1)+'B';
    if (n>=1e6) return (n/1e6).toFixed(1)+'M';
    if (n>=1e3) return (n/1e3).toFixed(1)+'K';
    return Math.floor(n)+'';
  }
  function recalc() {
    G.cps = G.B.reduce((s,b)=>s+b.cps*b.count,0);
    G.cp  = Math.max(1, Math.floor(G.cps*0.01+1));
  }
  function ui() {
    document.getElementById('rc').textContent = fmt(G.credits);
    document.getElementById('re').textContent = G.cps.toFixed(1);
    document.getElementById('rp').textContent = G.B.reduce((s,b)=>s+b.count,0);
    document.getElementById('s0').textContent = fmt(G.total);
    document.getElementById('s1').textContent = G.cps.toFixed(2);
    document.getElementById('s2').textContent = fmt(G.clicks);
    document.getElementById('s5').textContent = G.pc;
    const sec=Math.floor((Date.now()-G.start)/1000);
    const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;
    document.getElementById('s3').textContent = h?`${h}h ${m}m`:m?`${m}m ${s}s`:`${s}s`;
    document.getElementById('s4').textContent = G.miles;
    G.B.forEach(b=>{
      const btn=document.getElementById('b_'+b.id);
      if (!btn) return;
      btn.disabled=G.credits<bc(b);
      btn.querySelector('.bc').textContent=fmt(bc(b));
      btn.querySelector('.bk').textContent=b.count;
    });
    document.getElementById('pb').classList.toggle('rdy',G.total>=1e6);
    const ml=G.ML[G.nextM];
    if (ml&&G.total>=ml.at) {
      addLog(ml.msg,ml.t); G.miles++; G.nextM++;
      document.getElementById('ftxt').textContent=ml.msg;
    }
  }
  function addLog(msg,t) {
    const d=document.getElementById('log');
    const el=document.createElement('div');
    el.className='ll '+(t||'i'); el.textContent='> '+msg;
    d.prepend(el);
    while (d.children.length>30) d.removeChild(d.lastChild);
  }
  function buildList() {
    const cont=document.getElementById('bl'); cont.innerHTML='';
    G.B.forEach(b=>{
      const btn=document.createElement('button');
      btn.className='bb'; btn.id='b_'+b.id;
      btn.innerHTML=`<div><div class="bn">${b.name}</div><div class="bd">${b.desc}</div></div><div style="text-align:right"><div class="bc">${fmt(bc(b))}</div><div class="bk">${b.count}</div></div>`;
      btn.addEventListener('click',()=>{
        const cost=bc(b); if(G.credits<cost)return;
        G.credits-=cost; b.count++; recalc();
        addLog('Built '+b.name+' #'+b.count,'g'); ui();
      });
      cont.appendChild(btn);
    });
  }
  function doClick(e) {
    G.credits+=G.cp; G.total+=G.cp; G.clicks++;
    const r=e.currentTarget.getBoundingClientRect();
    const el=document.createElement('div');
    el.className='flt'; el.textContent='+'+G.cp;
    el.style.cssText=`left:${e.clientX-r.left}px;top:${e.clientY-r.top-10}px`;
    e.currentTarget.appendChild(el);
    setTimeout(()=>el.remove(),1000);
    ui();
  }
  function prestige() {
    if (G.total<1e6) return;
    if (!confirm('PRESTIGE? All progress resets!')) return;
    G.pc++; G.credits=0; G.total=0; G.clicks=0; G.cps=0;
    G.nextM=0; G.miles=0; G.start=Date.now();
    G.B.forEach(b=>b.count=0); recalc();
    addLog('Prestige #'+G.pc+' — colony reborn!','g');
    document.getElementById('ftxt').textContent='Prestige #'+G.pc+'!';
    ui();
  }

  // ── CANVAS SCENE ──
  const canvas=document.getElementById('gc');
  const ctx=canvas.getContext('2d');
  let W=0,H=0;
  const stars=[],sparks=[];
  const rover={x:60,dir:1,speed:0.8,mining:false,mt:0};
  const crew=[
    {x:200,dir: 1,spd:.40,col:'#ff8888',ph:0},
    {x:320,dir:-1,spd:.30,col:'#8888ff',ph:2},
    {x:440,dir: 1,spd:.25,col:'#88ff88',ph:4},
  ];

  function resize() {
    const sw=document.getElementById('sw');
    W=sw.clientWidth; H=sw.clientHeight;
    canvas.width=W; canvas.height=H;
    stars.length=0;
    for (let i=0;i<55;i++) stars.push({x:Math.random()*W,y:Math.random()*H*.62,r:Math.random()<.25?2:1,ph:Math.random()*6.28});
    rover.x=W*.08;
    crew[0].x=W*.45; crew[1].x=W*.58; crew[2].x=W*.70;
  }

  function GND() { return Math.floor(H*.67); }
  function px(x,y,w,h,c) { ctx.fillStyle=c; ctx.fillRect(Math.round(x),Math.round(y),w,h); }

  function drawRover(t) {
    const g=GND(),x=rover.x;
    ctx.save();
    if (rover.dir<0) { ctx.translate(x+30,g); ctx.scale(-1,1); }
    else ctx.translate(x,g);
    px(0,-12,9,12,'#3a3a3a'); px(21,-12,9,12,'#3a3a3a');
    px(1,-13,7,3,'#666');     px(22,-13,7,3,'#666');
    px(8,-8,14,4,'#555');
    px(3,-26,24,16,'#2a7a3a'); px(5,-28,20,5,'#3a8a4a');
    px(7,-36,16,13,'#1a4a26');
    px(9,-34,5,9,'#5de8ff');  px(16,-34,5,9,'#5de8ff');
    px(13,-44,2,10,'#888');   px(11,-46,6,3,'#f00');
    const ang=rover.mining?Math.sin(t*6)*.5:-.15;
    ctx.save(); ctx.translate(27,-18); ctx.rotate(ang);
    px(0,-16,3,16,'#777'); px(-3,-18,9,5,'#ff9900');
    ctx.restore();
    if (!rover.mining) {
      ctx.fillStyle=`rgba(150,150,150,${.3+.2*Math.sin(t*8)})`;
      ctx.fillRect(rover.dir>0?-4:28,-8,4,4);
    }
    ctx.restore();
  }

  function drawCrew(c,t) {
    const g=GND(),leg=Math.sin(t*4.5+c.ph);
    ctx.save();
    if (c.dir<0) { ctx.translate(c.x+12,g); ctx.scale(-1,1); ctx.translate(-6,0); }
    else ctx.translate(c.x,g);
    px(1+leg*3,-14,4,14,c.col+'99');
    px(7-leg*3,-14,4,14,c.col+'99');
    px(0,-30,13,17,c.col);
    px(1,-42,11,14,'#1a2a3a'); px(3,-40,7,10,'#6de8ff');
    px(-4,-29+leg*3,4,9,c.col); px(13,-29-leg*3,4,9,c.col);
    px(4,-39,3,4,'rgba(180,240,255,0.4)');
    ctx.restore();
  }

  function drawScene() {
    if (!W||!H) return;
    const t=Date.now()/1000,g=GND();
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#03030f'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#060618'; ctx.fillRect(0,H*.3,W,H*.4);
    ctx.fillStyle='rgba(60,0,100,.06)';  ctx.fillRect(W*.05,H*.05,W*.35,H*.35);
    ctx.fillStyle='rgba(0,40,100,.06)';  ctx.fillRect(W*.55,H*.08,W*.4,H*.3);

    for (const s of stars) {
      ctx.fillStyle=`rgba(210,220,255,${.25+.65*Math.sin(s.ph+t*.6)})`;
      ctx.fillRect(Math.round(s.x),Math.round(s.y),s.r,s.r);
    }

    ctx.fillStyle='#1e1535'; ctx.beginPath(); ctx.arc(W*.12,H*.14,20,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#130e25'; ctx.beginPath(); ctx.arc(W*.12+7,H*.14-5,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2a2050'; ctx.beginPath(); ctx.arc(W*.85,H*.10,13,0,Math.PI*2); ctx.fill();

    if (G.B[7].count>0) {
      ctx.fillStyle='rgba(255,185,0,.07)'; ctx.fillRect(0,0,W,H*.65);
      ctx.fillStyle='rgba(255,185,0,.10)'; ctx.fillRect(W*.25,0,W*.5,H*.4);
    }
    if (G.B[6].count>0) {
      const wx=W*.9,wy=g-50,pa=t*1.3;
      ctx.strokeStyle='#9933ff'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.ellipse(wx,wy,11,30,pa,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle='rgba(140,60,255,.3)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.ellipse(wx,wy,18,38,pa+.7,0,Math.PI*2); ctx.stroke();
      const pg=ctx.createRadialGradient(wx,wy,0,wx,wy,12);
      pg.addColorStop(0,'rgba(160,80,255,.7)'); pg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(wx,wy,12,0,Math.PI*2); ctx.fill();
    }
    if (G.B[5].count>0) {
      const rl=Math.sin(t*1.8)*2;
      px(W*.06-1,g-55,15,55,'#2a3322'); px(W*.06-5,g-60,23,9,'#3a4432');
      px(W*.06+4,g-76+rl,5,20,'#4a5442'); px(W*.06+2,g-82,9,10,'#2a3322');
    }

    px(0,g,W,H-g,'#100c07'); px(0,g,W,5,'#251404');
    [[W*.03,6,'#181008'],[W*.20,4,'#1c1208'],[W*.44,9,'#141008'],
     [W*.63,5,'#181008'],[W*.79,7,'#160d06'],[W*.93,4,'#181008']
    ].forEach(([rx,rs,rc])=>{ px(rx,g-rs,rs*2,rs,rc); px(rx-2,g-rs+2,rs*2+4,rs-2,rc); });

    [[W*.21,g+14,18,9],[W*.51,g+21,24,11],[W*.77,g+11,14,7]].forEach(([cx2,cy,rw,rh])=>{
      ctx.fillStyle='#0b0705'; ctx.beginPath(); ctx.ellipse(cx2,cy,rw,rh,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#1c0d05'; ctx.lineWidth=1; ctx.stroke();
    });

    const oreN=Math.min(3+G.B[0].count,7);
    for (let i=0;i<oreN;i++) {
      const ox=W*(.07+i*.13),pulse=.45+.45*Math.sin(t*2.2+i*1.3);
      ctx.fillStyle=`rgba(255,155,0,${pulse*.65})`; ctx.fillRect(Math.round(ox)-4,g-6,8,6);
      ctx.fillStyle='rgba(255,210,50,.9)';          ctx.fillRect(Math.round(ox)-1,g-5,3,4);
    }

    ctx.fillStyle='#182840';
    ctx.beginPath(); ctx.ellipse(W*.5,g,40,44,0,-Math.PI,0); ctx.fill();
    ctx.strokeStyle='#3a70c0'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='rgba(80,200,255,.2)';
    ctx.beginPath(); ctx.ellipse(W*.5,g-18,17,20,0,-Math.PI,0); ctx.fill();
    ctx.strokeStyle='rgba(80,200,255,.4)'; ctx.lineWidth=1; ctx.stroke();
    px(W*.5-4,g-13,9,13,'#0a1520'); px(W*.5-3,g-12,7,2,'#1a3050');

    if (G.B[0].count>0) {
      const dx=W*.32;
      px(dx-2,g-32,4,32,'#7a4a10'); px(dx-8,g-9,16,6,'#3a3a3a');
      ctx.save(); ctx.translate(dx,g-32); ctx.rotate(t*3.5);
      px(-5,-5,10,10,'#cc6600'); px(-2,-2,4,4,'#ffaa00'); ctx.restore();
      px(dx-1,g-40,2,10,'#aa7730');
      if (Math.random()<.15) sparks.push({x:dx+(Math.random()-.5)*6,y:g-10,vy:-1.2,vx:0,life:20,col:'#ffaa00'});
    }
    if (G.B[1].count>0) {
      const sx=W*.70;
      px(sx-1,g-34,2,34,'#2a2a2a');
      [sx-26,sx+4].forEach(spx=>{
        px(spx,g-34,22,14,'#0a35aa');
        for (let i=0;i<3;i++) px(spx+1+i*7,g-33,6,12,'#1550dd');
        px(spx,g-22,22,3,'#0a2a80');
      });
    }
    if (G.B[4].count>0) {
      const rx=W*.14,gv=.35+.3*Math.sin(t*3.2);
      px(rx-10,g-42,20,42,'#1e2e14'); px(rx-12,g-46,24,9,'#2a3e1e'); px(rx-7,g-58,14,16,'#364e28');
      ctx.fillStyle=`rgba(0,255,70,${gv})`; ctx.beginPath(); ctx.arc(rx,g-50,8,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(0,255,70,.1)';    ctx.beginPath(); ctx.arc(rx,g-50,20,0,Math.PI*2); ctx.fill();
    }
    if (G.B[3].count>0) {
      [W*.37,W*.57].forEach((bx,bi)=>{
        const bob=Math.sin(t*3.5+bi*2)*2.5,by=g-22+bob;
        px(bx-6,by,11,15,'#3a4f66'); px(bx-4,by-7,8,8,'#2a3f55');
        px(bx-8,by+2,2,8,'#2a3f55'); px(bx+5,by+2,2,8,'#2a3f55');
        px(bx-4,by+15,2,8,'#1e3040'); px(bx+2,by+15,2,8,'#1e3040');
        ctx.fillStyle=`rgba(255,50,0,${.5+.5*Math.sin(t*4+bi)})`;
        ctx.fillRect(Math.round(bx)-1,Math.round(by)-5,3,3);
      });
    }

    const crewVis=Math.min(G.B[2].count+G.B[3].count,3);
    for (let i=0;i<crewVis;i++) {
      const c=crew[i];
      c.x+=c.spd*c.dir;
      if (c.x>W*.92) c.dir=-1;
      if (c.x<W*.03) c.dir=1;
      drawCrew(c,t);
    }

    if (G.B[2].count>0) {
      rover.x+=rover.speed*rover.dir;
      const oc=Math.min(3+G.B[0].count,7);
      let near=false;
      for (let i=0;i<oc;i++) { if (Math.abs(rover.x+15-W*(.07+i*.13))<24) { near=true; break; } }
      rover.mining=near;
      if (near) {
        rover.mt++;
        if (rover.mt%25===0) sparks.push({x:rover.x+22+(Math.random()-.5)*8,y:g-14,vy:-1.8,vx:(Math.random()-.5)*2.5,life:45,col:'#ffaa00'});
      } else rover.mt=0;
      if (rover.x>W*.93) rover.dir=-1;
      if (rover.x<W*.02) rover.dir=1;
      drawRover(t);
    }

    for (let i=sparks.length-1;i>=0;i--) {
      const p=sparks[i];
      p.x+=(p.vx||0); p.y+=p.vy; p.life--;
      ctx.globalAlpha=p.life/45; ctx.fillStyle=p.col;
      ctx.fillRect(Math.round(p.x),Math.round(p.y),3,3);
      ctx.globalAlpha=1;
      if (p.life<=0) sparks.splice(i,1);
    }

    ctx.fillStyle='rgba(0,255,255,.5)';
    ctx.font='6px "Press Start 2P"'; ctx.textAlign='left';
    ctx.fillText('BLDGS:'+G.B.reduce((s,b)=>s+b.count,0),5,13);
    ctx.fillText('CPS:'+G.cps.toFixed(1),5,23);
    if (rover.mining) { ctx.fillStyle='rgba(255,160,0,.9)'; ctx.fillText('MINING...',5,33); }
  }

  function init() {
    resize(); buildList();
    addLog('Colony systems online.','i');
    addLog('Click the surface to mine!','i');
    ui();
  }

  window.addEventListener('resize', resize);
  setInterval(()=>{ G.credits+=G.cps*.1; G.total+=G.cps*.1; ui(); drawScene(); },100);
  setTimeout(init, 200);
</script>
</body>
</html>
